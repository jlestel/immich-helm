{{- if .Values.workers.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "immich.fullname" . }}-workers
  labels:
    {{- include "immich.workersLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.workers.replicaCount }}
  strategy:
    type: {{ .Values.workers.deploymentStrategy }}
  selector:
    matchLabels:
      {{- include "immich.workersSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.server.configuration }}
        serverConfig/checksum: {{ include "immich.serverConfig" . | sha256sum }}
        {{- end }}
        secretEnv/checksum: {{ include "immich.server.secretEnv" . | sha256sum }}
        {{- with .Values.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "immich.workersLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          env:
            - name: IMMICH_WORKERS_INCLUDE
              value: microservices
            {{- if .Values.server.configuration }}
            - name: IMMICH_CONFIG_FILE
              value: /config/immich-config.yaml
            {{- end }}
            {{- with .Values.workers.extraEnv }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "immich.fullname" . }}-server-env
            {{- with .Values.workers.extraEnvFrom }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.workers.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.server.configuration .Values.workers.volumes .Values.server.persistence.enabled }}
          volumeMounts:
            {{- if .Values.server.configuration }}
            - name: config
              mountPath: /config
            {{- end }}
            {{- if .Values.server.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- with .Values.workers.volumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.server.configuration .Values.workers.volumes .Values.server.persistence.enabled }}
      volumes:
        {{- if .Values.server.configuration }}
        - name: config
          configMap:
            name: {{ include "immich.fullname" . }}-server
        {{- end }}
        {{- if .Values.server.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "immich.server.persistence.claimName" . }}
        {{- end }}
        {{- with .Values.workers.volumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.workers.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workers.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workers.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
{{- end }}
